<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Countdown Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #050505 0%, #000000 100%);
            min-height: 100vh;
            min-height: 100dvh; /* Dynamic viewport height for mobile */
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: clamp(30px, 8vh, 80px);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Selection Screen */
        #selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .btn-container {
            display: flex;
            gap: clamp(20px, 5vw, 50px);
        }

        .time-btn {
            width: clamp(100px, 25vw, 200px);
            height: clamp(100px, 25vw, 200px);
            border-radius: 50%;
            border: none;
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-20 {
            background: linear-gradient(145deg, #e94560, #c73e54);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        .btn-30 {
            background: linear-gradient(145deg, #0f3460, #0a2540);
            box-shadow: 0 10px 30px rgba(15, 52, 96, 0.4);
        }

        .time-btn:hover {
            transform: scale(1.1);
        }

        .time-btn:active {
            transform: scale(0.95);
        }

        /* Countdown Screen */
        #countdown-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .countdown-display {
            font-size: clamp(10rem, 20vw, 15rem);
            font-weight: bold;
            letter-spacing: clamp(2px, 1vw, 10px);
            margin-bottom: clamp(20px, 5vh, 50px);
        }

        .game-over-text {
            font-size: clamp(3rem, 15vw, 12rem);
            font-weight: bold;
            color: #e94560;
        }

        .cancel-btn {
            padding: clamp(12px, 2vw, 20px) clamp(30px, 5vw, 60px);
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            border: 2px solid #e94560;
            background: transparent;
            color: #e94560;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .cancel-btn:hover {
            background: #e94560;
            color: white;
        }

        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            h1 {
                margin-bottom: 15px;
                font-size: 1.3rem;
            }

            .time-btn {
                width: 80px;
                height: 80px;
                font-size: 1.5rem;
            }

            .countdown-display {
                font-size: 12rem;
                margin-bottom: 15px;
            }

            .cancel-btn {
                padding: 10px 25px;
                font-size: 0.9rem;
            }
        }

        /* Small mobile portrait */
        @media (max-width: 360px) {
            .btn-container {
                flex-direction: column;
                gap: 15px;
            }
        }

        /* Welcome Screen */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .start-btn {
            width: clamp(180px, 40vw, 300px);
            height: clamp(180px, 40vw, 300px);
            border-radius: 50%;
            border: none;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            background: linear-gradient(145deg, #28a745, #1e7e34);
            box-shadow: 0 10px 40px rgba(40, 167, 69, 0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .start-btn:hover {
            transform: scale(1.1);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Welcome Screen -->
        <div id="welcome-screen">
            <h1>Countdown Timer</h1>
            <button class="start-btn" onclick="enterFullscreen()">TAP TO<br>START</button>
        </div>

        <!-- Selection Screen -->
        <div id="selection-screen" class="hidden">
            <h1>Select Countdown Time</h1>
            <div class="btn-container">
                <button class="time-btn btn-20" onclick="startCountdown(10)">10</button>
                <button class="time-btn btn-20" onclick="startCountdown(5)">5</button>
                <button class="time-btn btn-30" onclick="startCountdown(15)">15</button>
            </div>
        </div>

        <!-- Countdown Screen -->
        <div id="countdown-screen" class="hidden">
            <!-- <h1>Time Remaining</h1> -->
            <div class="countdown-display" id="countdown">00:00</div>
            <!-- <button class="cancel-btn" onclick="cancelCountdown()">Cancel</button> -->
        </div>
    </div>

    <script>
        let countdownInterval = null;
        let totalSeconds = 0;

        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
            
            // Show selection screen
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('selection-screen').classList.remove('hidden');
        }

        // Check if already in fullscreen (e.g., installed as web app)
        document.addEventListener('DOMContentLoaded', function() {
            if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
                // Already running as installed app, skip welcome
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('selection-screen').classList.remove('hidden');
            }
        });

        function startCountdown(minutes) {
            totalSeconds = minutes * 60;
            
            // Switch screens
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('countdown-screen').classList.remove('hidden');
            document.getElementById('countdown-screen').style.display = 'flex';
            
            // Update display immediately
            updateDisplay();
            
            // Start the countdown
            countdownInterval = setInterval(() => {
                totalSeconds--;
                updateDisplay();
                
                if (totalSeconds <= 0) {
                    clearInterval(countdownInterval);
                    // Show GAME OVER for 3 seconds then redirect
                    showGameOver();
                }
            }, 1000);
        }

        function updateDisplay() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const display = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('countdown').textContent = display;
        }

        function cancelCountdown() {
            clearInterval(countdownInterval);
            goToSelection();
        }

        function showGameOver() {
            const countdownEl = document.getElementById('countdown');
            countdownEl.textContent = 'GAME OVER';
            countdownEl.classList.add('game-over-text');

            const cancelBtn = document.querySelector('.cancel-btn');
            const countdownHeader = document.querySelector('#countdown-screen h1');
            if (cancelBtn) {
                cancelBtn.style.display = 'none';
            }
            if (countdownHeader) {
                countdownHeader.style.display = 'none';
            }
            
            setTimeout(() => {
                countdownEl.classList.remove('game-over-text');
                if (cancelBtn) {
                    cancelBtn.style.display = '';
                }
                if (countdownHeader) {
                    countdownHeader.style.display = '';
                }
                goToSelection();
            }, 3000);
        }

        function goToSelection() {
            document.getElementById('countdown-screen').classList.add('hidden');
            document.getElementById('countdown-screen').style.display = 'none';
            document.getElementById('selection-screen').classList.remove('hidden');
            document.getElementById('selection-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
